title: Gruvbox
author: Roman Overko
description: Retro-groove Gruvbox HTML theme for Quarto, with coordinated dark and light variants.
version: 1.0.0
quarto-required: ">=1.9.0"
contributes:
  formats:
    html:
      toc: true
      theme:
        dark: gruvbox-dark.scss
        light: gruvbox-light.scss
      highlight-style:
        dark: gruvbox-dark.theme
        light: gruvbox-light.theme

